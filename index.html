<!DOCTYPE html>
<html>
<head>
    <title>Mohamad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 40px 30px;
            width: min(320px, 85vw);
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid white;
            border-radius: 18px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 40px;
            margin: 0 0 10px;
        }

        p {
            color: #aaa;
            font-size: 16px;
            margin: 0 0 24px;
        }

        .btn {
            padding: 12px 25px;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
        }

        .btn:hover {
            background: white;
            color: black;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Mohamad Shakif Nawaz</h1>
        <p>Learning C++, till object oriented programming.</p>

        <a href="https://github.com/Mohamad-ui" target="_blank">
            <button class="btn">View My Progress</button>
        </a>
    </div>
</body>
</html>
