<!DOCTYPE html>
<html>
<head>    
    <title>Mohamad</title>

<style>
	body {
	    margin: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	    overflow: hidden;
	}



	.container {
		text-align: center;
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);

		padding: 40px;
		background: rgba(225, 225, 225, 0.08);

		clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%
			);

		border: 1px solid white;
		box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
		backdrop-filter: blur(10px);
	}

	}


        h1 {
            font-size: 50px;
            margin-bottom: 10px;
            animation: fadeIn 1.5s ease-in-out;
        }

        p {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 30px;
            animation: fadeIn 2s ease-in-out;
        }

          .btn {
         padding: 12px 25px;
         border: 2px solid white;
         background: transparent;
         color: white;
         font-size: 16px;
         cursor: pointer;
         transition: 0.3s;
         animation: fadeIn 2.5s ease-in-out;
         border-radius: 5px; 
}

        .btn:hover {
            background: white;
            color: black;
            transform: scale(1.1);
            box-shadow: 0 0 15px white;	
        }


        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Mohamad Shakif Nawaz</h1>
        <p>Learning C++, till object oriented programming.</p>

        <a href="https://github.com/Mohamad-ui" target="_blank">
    <button class="btn">View My Progress</button>
        
        </a>
    </div>

</body>
</html>
